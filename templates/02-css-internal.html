<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template 2 - CSS Internal</title>
    <style>
        /* CSS Internal Style */
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        h1 {
            color: #333;
            text-align: center;
        }
        
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        p {
            color: #666;
            line-height: 1.6;
        }
        
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        
        #special {
            background-color: #3498db;
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Contoh CSS Internal</h1>
    
    <div class="container">
        <p>Ini adalah paragraf dengan styling internal CSS.</p>
        <p class="highlight">Ini adalah teks dengan class highlight.</p>
        <p id="special">Ini adalah teks dengan id special.</p>
    </div>
</body>
</html>
