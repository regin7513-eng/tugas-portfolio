<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template 3 - Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input[type="submit"],
        input[type="reset"] {
            padding: 10px 20px;
            margin-right: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type="reset"] {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Form Pendaftaran</h1>
    
    <form action="/submit" method="post">
        <!-- Text Input -->
        <div class="form-group">
            <label for="nama">Nama Lengkap:</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
        </div>
        
        <!-- Email Input -->
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
        </div>
        
        <!-- Password Input -->
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <!-- Number Input -->
        <div class="form-group">
            <label for="umur">Umur:</label>
            <input type="number" id="umur" name="umur" min="1" max="100">
        </div>
        
        <!-- Date Input -->
        <div class="form-group">
            <label for="tanggal">Tanggal Lahir:</label>
            <input type="date" id="tanggal" name="tanggal">
        </div>
        
        <!-- Radio Button -->
        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <input type="radio" id="laki" name="gender" value="laki" required>
            <label for="laki">Laki-laki</label>
            <input type="radio" id="perempuan" name="gender" value="perempuan">
            <label for="perempuan">Perempuan</label>
        </div>
        
        <!-- Checkbox -->
        <div class="form-group">
            <label>Hobi:</label>
            <input type="checkbox" id="membaca" name="hobi" value="membaca">
            <label for="membaca">Membaca</label>
            <input type="checkbox" id="coding" name="hobi" value="coding">
            <label for="coding">Coding</label>
            <input type="checkbox" id="gaming" name="hobi" value="gaming">
            <label for="gaming">Gaming</label>
        </div>
        
        <!-- Select Dropdown -->
        <div class="form-group">
            <label for="jurusan">Jurusan:</label>
            <select id="jurusan" name="jurusan" required>
                <option value="">-- Pilih Jurusan --</option>
                <option value="informatika">Informatika</option>
                <option value="sipil">Teknik Sipil</option>
                <option value="elektro">Teknik Elektro</option>
                <option value="mesin">Teknik Mesin</option>
            </select>
        </div>
        
        <!-- Textarea -->
        <div class="form-group">
            <label for="pesan">Pesan:</label>
            <textarea id="pesan" name="pesan" rows="4" cols="50" placeholder="Tulis pesan Anda di sini..."></textarea>
        </div>
        
        <!-- Submit and Reset Buttons -->
        <div class="form-group">
            <input type="submit" value="Kirim">
            <input type="reset" value="Reset">
        </div>
    </form>
</body>
</html>
